  spec_version: v0.1
  record_id: ctr_01JTK9R8M5A2X1QY7Z
  trace_id: ctid_01JTK9R8TRACEABC123
  parent_trace_id: ctid_01JTK9R7ROOTABC001
  session_id: sess_20260502_001
  thread_id: thread_note_draft_01
  event_time: "2026-05-02T06:30:00Z"
  recorded_at: "2026-05-02T06:30:02Z"

  actor:
    actor_id: ai_masamune
    actor_type: ai
    role: summarizer
    display_name: Masamune
    model_name: gpt-5.5-thinking
