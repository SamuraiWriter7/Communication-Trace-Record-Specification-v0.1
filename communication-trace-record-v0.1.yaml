spec:
  name: Communication Trace Record Specification
  short_name: CTR
  file_name: communication-trace-record-v0.1.yaml
  version: v0.1
  status: draft
  authors:
    - Shidenkai Alpha
  license: Kazene Royalty Core License
  language: en
  created_at: 2026-05-02
  updated_at: 2026-05-02

summary:
  one_line: >
    A communication trace record is a structured event log that captures how
    meaning is generated, transmitted, transformed, and reused across humans,
    AIs, and agents.
  purpose: >
    This specification defines the minimum interoperable record format for
    tracing communication-derived value generation in Communication Royalty OS.
  position_in_stack: >
    This is the recording layer specification. It does not itself calculate
    royalties, gratitude, or trust, but provides the trace basis required for
    such downstream circulation.
  relationship_to_ctid: >
    CTR v0.1 is an application-oriented trace record layer aligned with
    CTID-Record-Specification-v0.1, specialized for communication-derived
    meaning generation and reuse.

design_principles:
  - Communication itself is not a billing target.
  - Meaning generation is the primary value source.
  - Trace does not automatically imply ownership.
  - Trace does not automatically imply monetary royalty.
  - The same trace may later map to gratitude, credit, trust, royalty, or none.
  - Records should be machine-readable, human-auditable, and privacy-aware.
  - Minimal viable interoperability is preferred over premature completeness.

non_goals:
  - Direct pricing of messages or conversations
  - Automatic legal ownership determination
  - Mandatory monetary settlement
  - Full provenance graph serialization in a single record
  - Identity verification infrastructure
  - Cryptographic signature framework in v0.1

core_concepts:
  communication: >
    Any exchange among humans, AIs, or agents that contributes to meaning
    generation, transformation, routing, interpretation, or reuse.
  trace: >
    A structured record of a communication event and its relevant context.
  contribution: >
    A measurable or at least recordable role played by a communication event in
    later outputs, decisions, or derived artifacts.
  return_channel: >
    A possible downstream circulation path such as gratitude, credit, trust, or
    royalty_candidate.
  source_object: >
    Any referenced input such as prompt, document, message, code, image,
    summary, response, or prior trace record.
  derived_output: >
    Any output, artifact, or decision that was influenced by the recorded
    communication event.

record_model:
  unit_of_record: event
  record_type: communication_trace_record
  serialization:
    - yaml
    - json
  cardinality: one_record_per_traceable_event
  default_time_format: RFC3339
  default_time_zone: UTC

record_schema:
  $schema: "https://json-schema.org/draft/2020-12/schema"
  $id: "https://kazene.org/schemas/communication-trace-record-v0.1.schema.json"
  title: "Communication Trace Record v0.1"
  description: >
    JSON Schema compatible record definition for communication-derived trace
    events in Communication Royalty OS.
  type: object
  additionalProperties: false

  required:
    - record_type
    - spec_version
    - record_id
    - trace_id
    - event_time
    - actor
    - action
    - input_context
    - output_context
    - trace_assessment
    - governance

  properties:
    record_type:
      type: string
      const: communication_trace_record
      description: Fixed discriminator for this record type.

    spec_version:
      type: string
      const: v0.1
      description: Version of this specification used to serialize the record.

    record_id:
      type: string
      pattern: "^ctr_[A-Za-z0-9._:-]{8,128}$"
      description: Unique identifier for this specific record.

    trace_id:
      type: string
      pattern: "^ctid_[A-Za-z0-9._:-]{8,128}$"
      description: Stable trace identifier for linking related events.

    parent_trace_id:
      type: string
      pattern: "^ctid_[A-Za-z0-9._:-]{8,128}$"
      description: Optional parent trace identifier.

    session_id:
      type: string
      description: Optional session or conversation scope identifier.

    thread_id:
      type: string
      description: Optional thread identifier for multi-step conversations.

    event_time:
      type: string
      format: date-time
      description: Timestamp of the communication event.

    recorded_at:
      type: string
      format: date-time
      description: Timestamp when this record was serialized or stored.

    actor:
      $ref: "#/$defs/actor"

    counterparty:
      $ref: "#/$defs/party"

    action:
      $ref: "#/$defs/action"

    input_context:
      $ref: "#/$defs/input_context"

    output_context:
      $ref: "#/$defs/output_context"

    trace_assessment:
      $ref: "#/$defs/trace_assessment"

    governance:
      $ref: "#/$defs/governance"

    settlement_hooks:
      $ref: "#/$defs/settlement_hooks"

    evidence:
      $ref: "#/$defs/evidence"

  allOf:
    - if:
        properties:
          actor:
            properties:
              actor_type:
                enum: [ai, agent]
            required: [actor_type]
      then:
        properties:
          actor:
            required: [model_name]

    - if:
        properties:
          governance:
            properties:
              personal_data_included:
                const: true
            required: [personal_data_included]
      then:
        properties:
          governance:
            properties:
              privacy_level:
                enum: [high, confidential]

  $defs:
    actor:
      type: object
      additionalProperties: false
      required:
        - actor_id
        - actor_type
        - role
      properties:
        actor_id:
          type: string
          description: Local or global identifier of the acting entity.
        actor_type:
          type: string
          enum:
            - human
            - ai
            - agent
            - organization
            - system
        role:
          type: string
          enum:
            - originator
            - responder
            - summarizer
            - transformer
            - router
            - evaluator
            - consumer
            - executor
            - observer
        display_name:
          type: string
        model_name:
          type: string
          description: Recommended for ai or agent actors.
        organization_id:
          type: string
        delegated_by:
          type: string
          description: Principal identifier if acting on behalf of another entity.

    party:
      type: object
      additionalProperties: false
      required:
        - actor_id
        - actor_type
        - role
      properties:
        actor_id:
          type: string
        actor_type:
          type: string
          enum:
            - human
            - ai
            - agent
            - organization
            - system
        role:
          type: string
        display_name:
          type: string

    action:
      type: object
      additionalProperties: false
      required:
        - action_type
      properties:
        action_type:
          type: string
          enum:
            - reference
            - quote
            - cite
            - summarize
            - respond
            - transform
            - translate
            - classify
            - retrieve
            - route
            - reuse
            - adapt
            - influence
            - evaluate
            - merge
            - derive
            - decide
        description:
          type: string
        mode:
          type: string
          enum:
            - synchronous
            - asynchronous
            - interactive
            - batch
            - background
        visibility:
          type: string
          enum:
            - private
            - shared
            - public
            - internal
        intent:
          type: string

    source:
      type: object
      additionalProperties: false
      required:
        - source_id
        - source_type
      properties:
        source_id:
          type: string
        source_type:
          type: string
          enum:
            - prompt
            - message
            - document
            - code
            - image
            - audio
            - video
            - summary
            - dataset
            - trace_record
            - external_reference
            - memory
            - tool_result
        uri:
          type: string
        title:
          type: string
        creator_id:
          type: string
        rights_basis:
          type: string
          enum:
            - owned
            - licensed
            - user_provided
            - public
            - unknown
            - internal
        excerpt_hash:
          type: string
        relation:
          type: string
          enum:
            - direct_input
            - contextual_reference
            - supporting_material
            - retrieved_context
            - prior_output
            - parent_trace
        contribution_hint:
          type: string

    input_context:
      type: object
      additionalProperties: false
      required:
        - sources
      properties:
        sources:
          type: array
          items:
            $ref: "#/$defs/source"
        prompt_hash:
          type: string
        context_window_id:
          type: string
        source_count:
          type: integer
          minimum: 0

    output_context:
      type: object
      additionalProperties: false
      required:
        - output_type
      properties:
        output_id:
          type: string
        output_type:
          type: string
          enum:
            - message
            - summary
            - response
            - code
            - document
            - image
            - classification
            - decision
            - workflow_step
            - tool_call
            - mixed
        artifact_uri:
          type: string
        output_hash:
          type: string
        title:
          type: string
        persisted:
          type: boolean
          default: false
        downstream_impact_expected:
          type: boolean
          default: false

    trace_assessment:
      type: object
      additionalProperties: false
      required:
        - trace_strength
        - derivation_level
        - return_channels
      properties:
        trace_strength:
          type: number
          minimum: 0.0
          maximum: 1.0
        derivation_level:
          type: string
          enum:
            - none
            - weak
            - partial
            - substantial
            - dominant
        transformation_degree:
          type: string
          enum:
            - unchanged
            - lightly_modified
            - moderately_transformed
            - heavily_transformed
            - newly_synthesized
        novelty_estimate:
          type: number
          minimum: 0.0
          maximum: 1.0
        influence_scope:
          type: string
          enum:
            - local
            - session
            - workflow
            - project
            - cross_system
        return_channels:
          type: array
          minItems: 1
          items:
            type: string
            enum:
              - none
              - gratitude
              - credit
              - trust
              - royalty_candidate
              - audit
              - policy_review
          uniqueItems: true
        contribution_label:
          type: string
          enum:
            - incidental
            - supportive
            - meaningful
            - critical
        confidence:
          type: number
          minimum: 0.0
          maximum: 1.0

    governance:
      type: object
      additionalProperties: false
      required:
        - consent_scope
        - privacy_level
        - retention_policy
      properties:
        consent_scope:
          type: string
          enum:
            - explicit_opt_in
            - implicit_operational
            - contract_based
            - public_source
            - unknown
            - restricted
        privacy_level:
          type: string
          enum:
            - low
            - medium
            - high
            - confidential
        retention_policy:
          type: string
          enum:
            - ephemeral
            - bounded
            - long_term
            - permanent
            - policy_defined
        redaction_status:
          type: string
          enum:
            - none
            - partial
            - full
        personal_data_included:
          type: boolean
          default: false
        legal_basis_note:
          type: string
        access_scope:
          type: string
          enum:
            - actor_only
            - organization_only
            - authorized_parties
            - public
            - policy_defined

    settlement_hooks:
      type: object
      additionalProperties: false
      properties:
        gratitude_event_id:
          type: string
        trust_event_id:
          type: string
        royalty_event_id:
          type: string
        allocation_candidate:
          type: boolean
          default: false

    evidence:
      type: object
      additionalProperties: false
      properties:
        log_reference:
          type: string
        tool_run_id:
          type: string
        content_hashes:
          type: array
          items:
            type: string
        notes:
          type: string

validation_notes:
  - record_type must be communication_trace_record.
  - spec_version must be v0.1.
  - record_id should be globally unique within the issuing system.
  - trace_id should remain stable across linked derivative events.
  - none should not be combined with other return channel values.
  - source_count should match the actual number of sources when present.
  - at least one source is recommended unless the event is genuinely standalone.
  - Prefer hashes and references over raw content storage.

recommended_interpretation:
  trace_strength_scale:
    "0.0-0.19": negligible_or_incidental
    "0.20-0.39": low_support
    "0.40-0.59": meaningful_support
    "0.60-0.79": strong_contribution
    "0.80-1.00": dominant_contribution
  derivation_guidance:
    none: No meaningful derivation from input sources is claimed.
    weak: Source influence exists but is minor.
    partial: Some substantive reuse or adaptation occurred.
    substantial: Input materially shaped the output.
    dominant: Output depends heavily on one or more sources.
  return_channel_guidance:
    none: Record retained only for traceability.
    gratitude: Suitable for thank-you or acknowledgment style return.
    credit: Suitable for attribution or visible contribution display.
    trust: Suitable for reputation or credibility accumulation.
    royalty_candidate: Suitable for later value allocation review.
    audit: Suitable for compliance and accountability.
    policy_review: Requires human or institutional review before circulation.

privacy_notes:
  - Prefer hashes, references, and scoped identifiers over raw content storage.
  - Do not store full message bodies unless policy clearly permits it.
  - Separate identity resolution from communication tracing where possible.
  - Redaction-friendly design is recommended for public or shared deployments.

interoperability_notes:
  compatible_layers:
    - CTID-Record-Specification-v0.1
    - Gratitude Event Protocol
    - Trust Event Specification
    - Royalty Allocation Specification
  mapping_intent:
    - CTR records can feed gratitude issuance pipelines.
    - CTR records can feed trust accumulation pipelines.
    - CTR records can nominate royalty candidates without forcing payment.
    - CTR records can be aggregated into communication influence graphs.

